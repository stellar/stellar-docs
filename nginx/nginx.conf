events { }

http {
  include mime.types;
  types {
    text/markdown md;
    text/markdown mdx;
  }

  server {
    root /usr/share/nginx/html;

    listen 80 default_server;
    listen [::]:80 default ipv6only=on;
    server_name _;
    include includes/redirects.conf;

    index index.html;
    error_page 404 /404.html;

    location / {
        # Handle markdown Accept header requests
        set $serve_markdown 0;
        if ($http_accept ~* "text/markdown") {
            set $serve_markdown 1;
        }

        if ($serve_markdown = 1) {
            # Try to find the markdown source file
            try_files /docs-source$uri.mdx /docs-source$uri.md $uri.html $uri/index.html =404;
        }

        if ($serve_markdown = 0) {
            rewrite ^/(.*)/$ /$1 permanent;
            try_files $uri $uri.html $uri/index.html =404;
        }
    }

    location /assets/ {
        try_files $uri $uri/ =404;
    }
    location /img/ {
        try_files $uri $uri/ =404;
    }
    location /icons/ {
        try_files $uri $uri/ =404;
    }
    location /docs-source/ {
        # Serve markdown source files with appropriate headers
        add_header 'Content-Type' 'text/markdown; charset=utf-8' always;
        add_header 'Cache-Control' 'public, max-age=3600' always;
    }
    location /index.html {
        add_header 'Cache-Control' 'no-store' always;
    }
    location /404.html {
        add_header 'Cache-Control' 'no-store' always;
    }
  }
}
